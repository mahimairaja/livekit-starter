# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: "en-US"
early_access: false
reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: true
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
  path_instructions:
    - path: "**/*.py"
      instructions: |
        Review Python code with awareness of the LiveKit Agents plus FastAPI stack. Ensure:
          - Each public function and class has a clear docstring explaining its purpose, parameters, and return values.
          - Do not suggest adding type annotations.
          - Avoid generic exception handling (e.g., `except Exception`) unless re-raised or logged with context.
    - path: "agent/**/*.py"
      instructions: |
        This is a LiveKit voice agent. Additionally ensure:
          - Agent entrypoints and tool functions are `async def`. Flag any blocking I/O on the async path.
          - LiveKit plugin usage (STT, TTS, LLM, VAD, turn detection) follows the LiveKit Agents conventions.
          - Tool functions registered with the agent have clear, LLM-readable docstrings, as these are surfaced to the model.
    - path: "backend/**/*.py"
      instructions: |
        This is a FastAPI backend. Additionally ensure:
          - Route handlers use proper response models and HTTP status codes.
          - Pydantic models are used for request/response validation. Avoid raw `dict` in route signatures.
          - Dependencies are injected via `Depends()` or the DI Container rather than instantiated inside route handlers.
    - path: "frontend/src/**/*.{ts,tsx}"
      instructions: |
        This is a React plus Vite frontend using LiveKit Agents UI components. Ensure:
          - Session handling uses the current APIs (useSession, AgentSessionProvider, useAgent, useSessionMessages).
          - Avoid `any`. Prefer precise types and the cn() helper for class composition.
          - Do NOT review the vendored copy-in components under components/ui, components/agents-ui,
            components/ai-elements, or hooks/agents-ui. They are generated by the shadcn registry.
    - path: "**/tests/**/*.py"
      instructions: |
        - Avoid broad exception handling in tests. Each assertion failure should surface naturally.
        - Test data is procedural/generic and non-sensitive.
chat:
  auto_reply: true
